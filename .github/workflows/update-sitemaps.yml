name: 🗺️ Update Sitemaps

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'data/products.ts'
      - 'data/seo.ts'
      - 'scripts/generate-sitemap.ts'
      - 'src/components/**/*.tsx'
      - '.github/workflows/update-sitemaps.yml'
  workflow_dispatch:

jobs:
  generate-sitemaps:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📚 Install dependencies
        run: npm ci

      - name: 🗺️ Generate sitemaps
        run: npm run sitemap:generate

      - name: 📊 Check if sitemaps changed
        id: verify_changed
        run: |
          if git diff --quiet public/sitemap*.xml public/sitemap-metadata.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: 📤 Commit and push sitemaps
        if: steps.verify_changed.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add public/sitemap*.xml public/sitemap-metadata.json
          git commit -m "🗺️ chore: update sitemaps [automated]" || echo "No changes to commit"
          git push origin ${{ github.head_ref || github.ref_name }}

      - name: 📝 Comment on PR
        if: steps.verify_changed.outputs.changed == 'true' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Sitemaps actualizados automáticamente\n\n- **sitemap.xml** (73 URLs)\n- **sitemap-products.xml** (46 productos)\n- **sitemap-categories.xml** (22 categorías)\n- **sitemap-metadata.json** (guía de medición)'
            })

      - name: 📊 Show statistics
        run: |
          echo "📈 Estadísticas generadas:"
          node -e "const meta = require('./public/sitemap-metadata.json'); console.log(JSON.stringify(meta.statistics, null, 2))"

      - name: 🚀 Verify sitemaps are accessible
        run: |
          echo "✅ Verificando accesibilidad de sitemaps..."
          test -f public/sitemap.xml && echo "✓ sitemap.xml encontrado" || exit 1
          test -f public/sitemap-products.xml && echo "✓ sitemap-products.xml encontrado" || exit 1
          test -f public/sitemap-categories.xml && echo "✓ sitemap-categories.xml encontrado" || exit 1
          test -f public/sitemap-metadata.json && echo "✓ sitemap-metadata.json encontrado" || exit 1
          echo "🎉 Todos los sitemaps están listos para desplegar"
